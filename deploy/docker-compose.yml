services:
  bot:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.bot
    image: tgdl-bot:local
    env_file:
      - ../.env
    environment:
      SQLITE_PATH: /app/data/tasks.db
    volumes:
      - tgdl-data:/app/data
    restart: unless-stopped

  downloader:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.downloader
      args:
        TDL_VERSION: v0.20.1
    image: tgdl-downloader:local
    env_file:
      - ../.env
    environment:
      TDL_BIN: /usr/local/bin/tdl
      SQLITE_PATH: /app/data/tasks.db
    volumes:
      - tgdl-data:/app/data
      - tgdl-tdl-session:/root/.tdl
    restart: unless-stopped

volumes:
  tgdl-data:
  tgdl-tdl-session:
