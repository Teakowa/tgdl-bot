services:
  bot:
    image: ghcr.io/teakowa/tgdl-bot:${BOT_IMAGE_TAG:-latest}
    env_file:
      - ../.env
    environment:
      SQLITE_PATH: /app/data/tasks.db
      TELEGRAM_WEBHOOK_LISTEN_ADDR: :8080
    volumes:
      - tgdl-data:/app/data
    ports:
      - "8080:8080"
    restart: unless-stopped

  downloader:
    image: ghcr.io/teakowa/tgdl-downloader:${DOWNLOADER_IMAGE_TAG:-latest}
    env_file:
      - ../.env
    environment:
      TDL_BIN: /usr/local/bin/tdl
      SQLITE_PATH: /app/data/tasks.db
    volumes:
      - tgdl-data:/app/data
      - tgdl-tdl-session:/root/.tdl
    restart: unless-stopped

volumes:
  tgdl-data:
  tgdl-tdl-session:
