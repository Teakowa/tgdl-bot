services:
  bot:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.bot
    image: tgdl-bot:local
    env_file:
      - ../.env
    environment:
      TELEGRAM_WEBHOOK_LISTEN_ADDR: :8080
    ports:
      - "8080:8080"
    restart: unless-stopped

  downloader:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.downloader
      args:
        TDL_VERSION: v0.20.1
    image: tgdl-downloader:local
    env_file:
      - ../.env
    environment:
      TDL_BIN: /usr/local/bin/tdl
    volumes:
      - tgdl-tdl-session:/root/.tdl
    restart: unless-stopped

volumes:
  tgdl-tdl-session:
    name: tgdl-tdl-session
