services:
  bot:
    image: ghcr.io/teakowa/tgdl-bot:${BOT_IMAGE_TAG:-latest}
    environment:
      ENV: ${ENV:-prod}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_API_BASE: ${TELEGRAM_API_BASE:-https://api.telegram.org}
      TELEGRAM_USE_WEBHOOK: ${TELEGRAM_USE_WEBHOOK:-false}
      TELEGRAM_WEBHOOK_URL: ${TELEGRAM_WEBHOOK_URL:-}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET:-}
      TELEGRAM_WEBHOOK_LISTEN_ADDR: ${TELEGRAM_WEBHOOK_LISTEN_ADDR:-:8080}
      TELEGRAM_ALLOWED_USER_IDS: ${TELEGRAM_ALLOWED_USER_IDS:-}
      CF_ACCOUNT_ID: ${CF_ACCOUNT_ID}
      CF_D1_DATABASE_ID: ${CF_D1_DATABASE_ID}
      CF_QUEUE_ID: ${CF_QUEUE_ID}
      CF_STATUS_QUEUE_ID: ${CF_STATUS_QUEUE_ID}
      CF_API_TOKEN: ${CF_API_TOKEN}
      CF_QUEUE_BATCH_SIZE: ${CF_QUEUE_BATCH_SIZE:-5}
      CF_QUEUE_VISIBILITY_TIMEOUT_MS: ${CF_QUEUE_VISIBILITY_TIMEOUT_MS:-900000}
      CF_QUEUE_PULL_INTERVAL_MS: ${CF_QUEUE_PULL_INTERVAL_MS:-3000}
    ports:
      - "8080:8080"
    restart: unless-stopped
