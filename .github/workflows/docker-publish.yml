name: Image Build

on:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths-ignore:
      - README.md
      - CHANGELOG.md
      - docs/**
      - .env.example
  pull_request:
    branches:
      - main
    paths-ignore:
      - README.md
      - CHANGELOG.md
      - docs/**
      - .env.example
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: publish-${{ matrix.job_name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - job_name: bot
            image_name: tgdl-bot
            dockerfile: deploy/Dockerfile.bot
            cache_scope: tgdl-bot-image
            build_args: ""
          - job_name: downloader
            image_name: tgdl-downloader
            dockerfile: deploy/Dockerfile.downloader
            cache_scope: tgdl-downloader-image
            build_args: TDL_VERSION=v0.20.1
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set image owner lowercase
        id: owner
        run: echo "value=${GITHUB_REPOSITORY_OWNER,,}" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        if: ${{ github.event_name != 'pull_request' }}
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ steps.owner.outputs.value }}/${{ matrix.image_name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build and push ${{ matrix.job_name }} image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ github.event_name == 'pull_request' && 'linux/amd64' || 'linux/amd64,linux/arm64' }}
          build-args: ${{ matrix.build_args }}
          pull: false
          push: ${{ github.event_name != 'pull_request' }}
          provenance: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.cache_scope }}
          cache-to: type=gha,mode=max,scope=${{ matrix.cache_scope }}
