name: ci-test

on:
  push:
    branches:
      - main
    paths-ignore:
      - README.md
      - docs/**
      - .env.example
  pull_request:
    branches:
      - main
    paths-ignore:
      - README.md
      - docs/**
      - .env.example
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test ./...
